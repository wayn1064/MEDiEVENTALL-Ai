steps:
  # 1. Backend Build
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/medieventall-backend', './backend']
    
  # 2. Backend Push
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/medieventall-backend']

  # 3. Backend Deploy
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'medieventall-backend'
      - '--image'
      - 'gcr.io/$PROJECT_ID/medieventall-backend'
      - '--region'
      - 'asia-northeast3'
      - '--allow-unauthenticated'
      - '--port'
      - '5001'
      - '--min-instances'
      - '0'

  # 4. Frontend Build
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/medieventall-frontend', './frontend']

  # 5. Frontend Push
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/medieventall-frontend']

  # 6. Frontend Deploy
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'medieventall-frontend'
      - '--image'
      - 'gcr.io/$PROJECT_ID/medieventall-frontend'
      - '--region'
      - 'asia-northeast3'
      - '--allow-unauthenticated'
      - '--port'
      - '80'
      - '--min-instances'
      - '0'

options:
  logging: CLOUD_LOGGING_ONLY

images:
  - 'gcr.io/$PROJECT_ID/medieventall-backend'
  - 'gcr.io/$PROJECT_ID/medieventall-frontend'
